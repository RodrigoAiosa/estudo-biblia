<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramificações da Bíblia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8a6a1f;
    --parch: #f5ead6;
    --parch-dark: #e8d5b0;
    --ink: #2a1a08;
    --ink-mid: #5a3e1b;
    --old: #7a3a1a;
    --old-light: #c4622a;
    --new: #1a3a6e;
    --new-light: #3b70c4;
    --shadow: rgba(42,26,8,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-texture {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,168,76,0.015) 40px, rgba(201,168,76,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.015) 40px, rgba(201,168,76,0.015) 41px);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    padding: 40px 0 50px;
    position: relative;
  }
  header::before, header::after {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 12px auto;
    width: 60%;
  }
  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    color: var(--gold-light);
    letter-spacing: 0.06em;
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.2;
  }
  .title-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: rgba(232,201,122,0.6);
    font-size: 1.15rem;
    margin-top: 6px;
    letter-spacing: 0.12em;
  }
  .ornament {
    color: var(--gold);
    font-size: 1.5rem;
    display: block;
    margin: 4px 0;
    opacity: 0.7;
  }

  .two-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-top: 10px;
  }
  @media (max-width: 700px) {
    .two-cols { grid-template-columns: 1fr; }
  }

  .testament-block {
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    animation: rise 0.7s ease both;
  }
  .testament-block.old { border-color: var(--old); animation-delay: 0.1s; }
  .testament-block.new { border-color: var(--new); animation-delay: 0.3s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .testament-header {
    padding: 20px 24px 16px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    transition: filter 0.2s;
  }
  .testament-header:hover { filter: brightness(1.1); }
  .old .testament-header {
    background: linear-gradient(135deg, #6b2a10 0%, #3d1505 100%);
  }
  .new .testament-header {
    background: linear-gradient(135deg, #132f60 0%, #061428 100%);
  }
  .t-icon { font-size: 2rem; flex-shrink: 0; }
  .t-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .t-count {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: rgba(232,201,122,0.65);
    margin-top: 2px;
  }
  .expand-arrow {
    margin-left: auto;
    color: var(--gold);
    font-size: 1.2rem;
    transition: transform 0.35s ease;
    flex-shrink: 0;
  }
  .testament-block.open .expand-arrow { transform: rotate(180deg); }

  .testament-body {
    background: rgba(20,12,4,0.85);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .testament-block.open .testament-body { max-height: 5000px; }

  .section-list { padding: 12px 0 8px; }

  .section-item {
    border-bottom: 1px solid rgba(201,168,76,0.07);
  }
  .section-item:last-child { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px 11px 24px;
    cursor: pointer;
    transition: background 0.18s;
    user-select: none;
  }
  .section-header:hover { background: rgba(201,168,76,0.06); }

  .sec-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid;
  }
  .old .sec-dot { background: var(--old-light); border-color: var(--old); }
  .new .sec-dot { background: var(--new-light); border-color: var(--new); }

  .sec-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    color: var(--gold-light);
    flex: 1;
  }
  .sec-count-badge {
    font-size: 0.72rem;
    font-style: italic;
    color: rgba(232,201,122,0.5);
    white-space: nowrap;
    font-family: 'Crimson Pro', serif;
  }
  .sec-arrow {
    color: rgba(201,168,76,0.5);
    font-size: 0.8rem;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .section-item.open .sec-arrow { transform: rotate(90deg); }

  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    padding: 6px 20px 14px 38px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s;
  }
  .section-item.open .books-grid { max-height: 800px; }

  .book-card {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 3px;
    padding: 7px 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .book-card:hover {
    background: rgba(201,168,76,0.13);
    border-color: rgba(201,168,76,0.35);
    transform: translateY(-1px);
  }
  .book-card.active {
    background: rgba(201,168,76,0.18);
    border-color: var(--gold);
  }
  .book-name {
    font-family: 'Crimson Pro', serif;
    font-size: 0.88rem;
    color: var(--parch);
    line-height: 1.3;
  }
  .book-chapters {
    font-size: 0.72rem;
    color: rgba(232,201,122,0.45);
    margin-top: 2px;
  }

  /* Info Panel */
  .info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(26,16,4,0.97) 0%, rgba(16,8,2,0.99) 100%);
    border-top: 2px solid var(--gold-dark);
    padding: 18px 24px 22px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
    max-height: 40vh;
    overflow-y: auto;
  }
  .info-panel.visible { transform: translateY(0); }
  .info-panel-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 24px; align-items: flex-start; }
  .info-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none; color: var(--gold); font-size: 1.3rem;
    cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
  }
  .info-close:hover { opacity: 1; }
  .info-book-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    color: var(--gold-light);
    margin-bottom: 4px;
  }
  .info-meta {
    font-style: italic;
    color: rgba(232,201,122,0.55);
    font-size: 0.88rem;
    margin-bottom: 10px;
  }
  .info-desc {
    color: var(--parch-dark);
    font-size: 1rem;
    line-height: 1.65;
    max-width: 700px;
  }
  .info-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    font-family: 'Cinzel Decorative', serif;
    margin-bottom: 8px;
  }
  .tag-old { background: rgba(122,58,26,0.5); color: var(--old-light); border: 1px solid var(--old); }
  .tag-new { background: rgba(26,58,110,0.5); color: var(--new-light); border: 1px solid var(--new); }

  /* Common Points Button */
  .common-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 20px 12px 38px;
    padding: 8px 14px;
    background: rgba(201,168,76,0.06);
    border: 1px dashed rgba(201,168,76,0.3);
    border-radius: 4px;
    color: rgba(232,201,122,0.65);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.88rem;
    transition: all 0.2s;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    width: calc(100% - 58px);
  }
  .section-item.open .common-btn { max-height: 60px; opacity: 1; }
  .common-btn:hover { background: rgba(201,168,76,0.14); border-color: rgba(201,168,76,0.6); color: var(--gold-light); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal-box {
    background: linear-gradient(160deg, #1e1006 0%, #110a02 100%);
    border: 1px solid var(--gold-dark);
    border-radius: 6px;
    max-width: 680px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .modal-overlay.visible .modal-box { transform: translateY(0) scale(1); }
  .modal-header {
    padding: 22px 50px 16px 24px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    position: sticky; top: 0;
    background: linear-gradient(160deg, #1e1006 0%, #110a02 100%);
    z-index: 1;
  }
  .modal-section-tag {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.62rem; letter-spacing: 0.12em;
    color: var(--gold-dark); margin-bottom: 5px;
  }
  .modal-title { font-family: 'Cinzel Decorative', serif; font-size: 1.05rem; color: var(--gold-light); }
  .modal-subtitle { font-style: italic; color: rgba(232,201,122,0.5); font-size: 0.85rem; margin-top: 3px; }
  .modal-close {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none;
    color: rgba(201,168,76,0.6); font-size: 1.2rem;
    cursor: pointer; transition: color 0.2s;
  }
  .modal-close:hover { color: var(--gold-light); }
  .modal-body { padding: 20px 24px 28px; }
  .common-grid { display: flex; flex-direction: column; gap: 12px; }
  .common-card {
    background: rgba(201,168,76,0.04);
    border: 1px solid rgba(201,168,76,0.1);
    border-left: 3px solid var(--gold-dark);
    border-radius: 0 4px 4px 0;
    padding: 13px 16px;
    animation: slideIn 0.4s ease both;
  }
  .common-card:nth-child(2){animation-delay:.05s} .common-card:nth-child(3){animation-delay:.1s}
  .common-card:nth-child(4){animation-delay:.15s} .common-card:nth-child(5){animation-delay:.2s}
  .common-card:nth-child(6){animation-delay:.25s} .common-card:nth-child(7){animation-delay:.3s}
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .common-card-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem; color: var(--gold);
    letter-spacing: 0.06em; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .common-card-text { font-size: 0.96rem; color: var(--parch-dark); line-height: 1.65; }
  .common-books-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .common-book-tag {
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 3px; padding: 2px 9px;
    font-size: 0.78rem; color: rgba(232,201,122,0.75); font-style: italic;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 18px 0 8px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
    animation: rise 0.7s ease both;
  }
  .stat:nth-child(2) { animation-delay: 0.15s; }
  .stat:nth-child(3) { animation-delay: 0.25s; }
  .stat-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.6rem;
    color: var(--gold-light);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-style: italic;
    color: rgba(232,201,122,0.5);
    font-size: 0.82rem;
    margin-top: 3px;
  }
  .stat-divider {
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--gold-dark), transparent);
    height: 40px;
    align-self: center;
  }

  /* Common Points Button */
  .common-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    margin: 4px 20px 12px 38px;
    background: rgba(201,168,76,0.08);
    border: 1px dashed rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 8px 14px;
    cursor: pointer;
    color: rgba(232,201,122,0.7);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.88rem;
    transition: all 0.2s;
    width: calc(100% - 58px);
    max-height: 0;
    overflow: hidden;
    opacity: 0;
  }
  .section-item.open .common-btn {
    max-height: 60px;
    opacity: 1;
  }
  .common-btn:hover {
    background: rgba(201,168,76,0.15);
    border-color: rgba(201,168,76,0.6);
    color: var(--gold-light);
  }
  .common-btn-icon { font-size: 1rem; }

  /* Common Points Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.visible {
    opacity: 1;

  }

    background: linear-gradient(160deg, #1e1006 0%, #110a02 100%);

    z-index: 1;
  }
  .modal-section-tag {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .modal-title {
    font-family: 'Cinzel Decorative', serif;

  }
  .modal-subtitle {

<body>
<div class="bg-texture"></div>
<div class="container">
  <header>
    <span class="ornament">✦</span>
    <div class="title-main">Ramificações da Bíblia Sagrada</div>
    <div class="title-sub">Velho Testamento & Novo Testamento</div>
    <span class="ornament">✦</span>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-num">66</span><div class="stat-label">Livros no total</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num">39</span><div class="stat-label">Velho Testamento</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-num">27</span><div class="stat-label">Novo Testamento</div></div>
  </div>

  <div class="two-cols" id="root"></div>
</div>

<!-- Common Points Modal -->
<div class="modal-overlay" id="commonModal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-section-tag" id="modalTag"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
      <button class="modal-close" onclick="closeCommonModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="common-grid" id="commonGrid"></div>
    </div>
  </div>
</div>

<div class="info-panel" id="infoPanel">
  <button class="info-close" onclick="closeInfo()">✕</button>
  <div class="info-panel-inner">
    <div>
      <div id="infoTag" class="info-tag"></div>
      <div class="info-book-name" id="infoName"></div>
      <div class="info-meta" id="infoMeta"></div>
      <div class="info-desc" id="infoDesc"></div>
    </div>
  </div>
</div>

<script>
const data = {
  old: {
    label: "Velho Testamento",
    icon: "📜",
    count: "39 livros",
    sections: [
      {
        name: "Pentateuco",
        desc: "Os cinco livros de Moisés — a Lei (Torá)",
        books: [
          { name: "Gênesis", ch: 50, desc: "A criação do mundo, a queda do homem, o dilúvio, os patriarcas Abraão, Isaque, Jacó e José." },
          { name: "Êxodo", ch: 40, desc: "A libertação dos israelitas do Egito por Moisés, o Mar Vermelho e a entrega da Lei no Sinai." },

  const cp = commonPoints[key][sectionName];
  if (!cp) return;

  document.getElementById('modalTag').textContent = data[key].label.toUpperCase();
  document.getElementById('modalTitle').textContent = `Pontos em Comum — ${sectionName}`;
  document.getElementById('modalSubtitle').textContent = cp.subtitle;

  const grid = document.getElementById('commonGrid');
  grid.innerHTML = cp.points.map(p => `
    <div class="common-card">
      <div class="common-card-title"><span class="ci">${p.icon}</span>${p.title}</div>
      <div class="common-card-text">${p.text}</div>
      ${p.books ? `<div class="common-books-list">${p.books.map(b => `<span class="common-book-tag">${b}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');

  document.getElementById('commonModal').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeCommonModal() {
  document.getElementById('commonModal').classList.remove('visible');
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('commonModal')) closeCommonModal();
}

function render() {
  const root = document.getElementById('root');
  ['old','new'].forEach(key => {
    const t = data[key];
    const block = document.createElement('div');
    block.className = `testament-block ${key}`;
    block.innerHTML = `
      <div class="testament-header" onclick="toggleTestament(this)">
        <span class="t-icon">${t.icon}</span>
        <div>
          <div class="t-title">${t.label}</div>
          <div class="t-count">${t.count} · ${t.sections.length} categorias</div>
        </div>
        <span class="expand-arrow">▾</span>
      </div>
      <div class="testament-body">
        <div class="section-list" id="sections-${key}"></div>
      </div>
    `;
    root.appendChild(block);

    const secList = block.querySelector(`#sections-${key}`);
    t.sections.forEach((sec, si) => {
      const item = document.createElement('div');
      item.className = 'section-item';
      const booksHtml = sec.books.map((b, bi) =>
        `<div class="book-card" onclick="showInfo(event,'${key}','${si}','${bi}')">
          <div class="book-name">${b.name}</div>
          <div class="book-chapters">${b.ch} cap.</div>
        </div>`
      ).join('');
      const hasCommon = commonPoints[key] && commonPoints[key][sec.name];
      item.innerHTML = `
        <div class="section-header" onclick="toggleSection(this)">
          <div class="sec-dot"></div>
          <div class="sec-name">${sec.name}</div>
          <span class="sec-count-badge">${sec.books.length} livros</span>
          <span class="sec-arrow">▶</span>
        </div>
        <div class="books-grid">${booksHtml}</div>
        ${hasCommon ? `<button class="common-btn" onclick="showCommonPoints('${key}','${sec.name}')"><span class="common-btn-icon">🔗</span> Ver pontos em comum desta seção</button>` : ''}
      `;
      secList.appendChild(item);
    });
  });
}

function toggleTestament(header) {
  const block = header.closest('.testament-block');
  block.classList.toggle('open');
}

function toggleSection(header) {
  const item = header.closest('.section-item');
  item.classList.toggle('open');
}

let activeCard = null;

function showInfo(e, key, si, bi) {
  e.stopPropagation();
  const book = data[key].sections[si].books[bi];
  const secName = data[key].sections[si].name;
  const isOld = key === 'old';

  document.getElementById('infoName').textContent = book.name;
  document.getElementById('infoMeta').textContent = `${data[key].label} · ${secName} · ${book.ch} capítulo${book.ch > 1 ? 's' : ''}`;
  document.getElementById('infoDesc').textContent = book.desc;

  const tag = document.getElementById('infoTag');
  tag.textContent = isOld ? 'VELHO TESTAMENTO' : 'NOVO TESTAMENTO';
  tag.className = `info-tag ${isOld ? 'tag-old' : 'tag-new'}`;

  document.getElementById('infoPanel').classList.add('visible');

  if (activeCard) activeCard.classList.remove('active');
  activeCard = e.currentTarget;
  activeCard.classList.add('active');
}

function closeInfo() {
  document.getElementById('infoPanel').classList.remove('visible');
  if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeInfo(); closeCommonModal(); } });

render();

// auto-open both testaments on load
setTimeout(() => {
  document.querySelectorAll('.testament-block').forEach(b => b.classList.add('open'));
}, 400);
</script>
</body>
</html>
